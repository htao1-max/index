<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的倒计时 ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --border-strong: rgba(0,0,0,0.14);
      --text-primary: #1a1917;
      --text-secondary: #6b6760;
      --text-tertiary: #a8a49e;
      --rose: #c87070;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141312;
        --surface: #1e1d1b;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.13);
        --text-primary: #f0ede8;
        --text-secondary: #9a9590;
        --text-tertiary: #6a6560;
        --rose: #d48a8a;
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Crimson Pro', 'Noto Serif SC', Georgia, serif;
      color: var(--text-primary);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .container { width: 100%; max-width: 660px; }

    .header { text-align: center; margin-bottom: 2rem; }

    .header-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 300;
      letter-spacing: 5px;
      margin-bottom: 6px;
    }

    .header-sub {
      font-size: 14px;
      color: var(--text-tertiary);
      font-style: italic;
      letter-spacing: 1px;
    }

    /* Cities */
    .cities-row {
      display: flex;
      align-items: stretch;
      margin-bottom: 1.2rem;
    }

    .city-card {
      flex: 1;
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      padding: 1.4rem 1.5rem;
      min-width: 0;
    }

    .city-card:first-child { border-radius: 14px 0 0 14px; border-right: none; }
    .city-card:last-child  { border-radius: 0 14px 14px 0; }

    .city-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .city-time {
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 300;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 3px;
      font-variant-numeric: tabular-nums;
    }

    .city-date {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 14px;
    }

    .weather-row { display: flex; align-items: center; gap: 10px; }
    .weather-icon { font-size: 24px; line-height: 1; }
    .weather-temp { font-size: 20px; font-weight: 300; line-height: 1; }
    .weather-desc {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: 'Noto Serif SC', serif;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 48px;
      flex-shrink: 0;
      gap: 6px;
    }

    .div-line { width: 1px; flex: 1; background: var(--border-strong); }
    .div-heart { font-size: 16px; color: var(--rose); }
    .div-km {
      font-size: 9px;
      color: var(--text-tertiary);
      writing-mode: vertical-lr;
      letter-spacing: 1px;
    }

    /* Countdown */
    .countdown-card {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: 14px;
      padding: 2rem 1.5rem;
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .cd-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 3px;
      margin-bottom: 1.4rem;
    }

    .cd-grid {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 4px;
      margin-bottom: 1.4rem;
    }

    .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 58px; }

    .cd-num {
      font-size: clamp(36px, 9vw, 50px);
      font-weight: 300;
      letter-spacing: -2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .cd-lbl {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 1px;
      font-family: 'Noto Serif SC', serif;
    }

    .cd-sep {
      font-size: 38px;
      font-weight: 200;
      color: var(--text-tertiary);
      padding-top: 4px;
      line-height: 1;
    }

    .progress-wrap { max-width: 360px; margin: 0 auto 0.6rem; }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border-strong);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .progress-fill {
      height: 100%;
      background: var(--rose);
      border-radius: 2px;
      transition: width 1s linear;
    }

    .progress-pct { font-size: 11px; color: var(--text-tertiary); text-align: right; }

    .meet-date { font-size: 14px; color: var(--text-secondary); font-style: italic; margin-top: 1rem; }

    .status-msg {
      font-size: 13px;
      color: var(--text-tertiary);
      font-style: italic;
      margin-top: 6px;
      min-height: 20px;
    }

    .footer { text-align: center; font-size: 11px; color: var(--text-tertiary); letter-spacing: 1px; }

    @media (max-width: 460px) {
      .cd-unit { min-width: 44px; }
      .cd-sep { font-size: 28px; }
      .city-card { padding: 1rem; }
      .countdown-card { padding: 1.4rem 1rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">我们的倒计时</div>
    <div class="header-sub">距离下次相聚</div>
  </div>

  <div class="cities-row">
    <div class="city-card">
      <div class="city-name">南京</div>
      <div class="city-time" id="time-nj">--:--:--</div>
      <div class="city-date" id="date-nj">---</div>
      <div class="weather-row">
        <div class="weather-icon" id="icon-nj">⏳</div>
        <div>
          <div class="weather-temp" id="temp-nj">--°C</div>
          <div class="weather-desc" id="desc-nj">加载中…</div>
        </div>
      </div>
    </div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-heart">♥</div>
      <div class="div-km">10867 km</div>
      <div class="div-line"></div>
    </div>

    <div class="city-card">
      <div class="city-name">大学公园市</div>
      <div class="city-time" id="time-cp">--:--:--</div>
      <div class="city-date" id="date-cp">---</div>
      <div class="weather-row">
        <div class="weather-icon" id="icon-cp">⏳</div>
        <div>
          <div class="weather-temp" id="temp-cp">--°F</div>
          <div class="weather-desc" id="desc-cp">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="countdown-card">
    <div class="cd-label">距 · 相 · 见</div>
    <div class="cd-grid">
      <div class="cd-unit">
        <div class="cd-num" id="cd-days">--</div>
        <div class="cd-lbl">天</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-num" id="cd-hours">--</div>
        <div class="cd-lbl">小时</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-num" id="cd-mins">--</div>
        <div class="cd-lbl">分钟</div>
      </div>
      <div class="cd-sep">:</div>
      <div class="cd-unit">
        <div class="cd-num" id="cd-secs">--</div>
        <div class="cd-lbl">秒</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0% 已过去</div>
    </div>
    <div class="meet-date">5月30日 · College Park, MD 🌸</div>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <div class="footer">天气数据来自 wttr.in · 自动更新</div>

</div>

<script>
  const TARGET   = new Date('2026-05-30T12:00:00');
  const START    = new Date('2026-01-24T00:00:00');

  function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }

  // Map wttr.in weather codes to emoji + Chinese/English description
  const WC = {
    113:['☀️','晴天','Sunny'],
    116:['⛅','多云','Partly cloudy'],
    119:['☁️','阴天','Cloudy'],
    122:['☁️','阴天','Overcast'],
    143:['🌫️','有雾','Mist'],
    176:['🌦️','小阵雨','Patchy rain'],
    179:['🌨️','小阵雪','Patchy snow'],
    182:['🌧️','冻雨','Sleet'],
    185:['🌧️','冻毛毛雨','Freezing drizzle'],
    200:['⛈️','雷阵雨','Thundery outbreaks'],
    227:['🌬️','飞雪','Blowing snow'],
    230:['❄️','暴风雪','Blizzard'],
    248:['🌫️','有雾','Fog'],
    260:['🌫️','冻雾','Freezing fog'],
    263:['🌦️','小毛毛雨','Light drizzle'],
    266:['🌧️','毛毛雨','Drizzle'],
    281:['🌧️','冻毛毛雨','Freezing drizzle'],
    284:['🌧️','冻毛毛雨','Heavy freezing drizzle'],
    293:['🌦️','小雨','Light rain'],
    296:['🌧️','小雨','Light rain'],
    299:['🌧️','中阵雨','Moderate rain'],
    302:['🌧️','中雨','Moderate rain'],
    305:['🌧️','大阵雨','Heavy rain'],
    308:['🌧️','大雨','Heavy rain'],
    311:['🌧️','冻雨','Light freezing rain'],
    314:['🌧️','冻雨','Moderate freezing rain'],
    317:['🌧️','小雨夹雪','Light sleet'],
    320:['🌨️','中雨夹雪','Moderate sleet'],
    323:['🌨️','小阵雪','Light snow'],
    326:['❄️','小阵雪','Light snow'],
    329:['❄️','中阵雪','Moderate snow'],
    332:['❄️','中雪','Moderate snow'],
    335:['❄️','大阵雪','Heavy snow'],
    338:['❄️','大雪','Heavy snow'],
    350:['🌧️','冰雹','Ice pellets'],
    353:['🌦️','小阵雨','Light shower'],
    356:['🌧️','中大阵雨','Moderate shower'],
    359:['🌧️','暴雨','Torrential rain'],
    362:['🌨️','小雨夹雪阵','Light sleet shower'],
    365:['🌨️','中雨夹雪阵','Moderate sleet shower'],
    368:['🌨️','小阵雪','Light snow shower'],
    371:['❄️','中大阵雪','Moderate snow shower'],
    374:['🌧️','小冰雹阵','Light ice pellet shower'],
    377:['🌧️','中冰雹阵','Moderate ice pellet shower'],
    386:['⛈️','小雷阵雨','Light thundery shower'],
    389:['⛈️','大雷阵雨','Heavy thundery shower'],
    392:['⛈️','小雷雪','Light thundery snow'],
    395:['⛈️','大雷雪','Heavy thundery snow'],
  };

  async function fetchWeather(city, isMetric, iconId, tempId, descId) {
    try {
      const unit = isMetric ? 'm' : 'u';
      const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1`;
      const res = await fetch(url);
      const d   = await res.json();
      const cur  = d.current_condition[0];
      const code = parseInt(cur.weatherCode);
      const temp = isMetric
        ? Math.round(parseFloat(cur.temp_C))
        : Math.round(parseFloat(cur.temp_F));
      const info = WC[code] || ['🌡️', '未知', 'Unknown'];
      document.getElementById(iconId).textContent = info[0];
      document.getElementById(tempId).textContent = `${temp}°${isMetric ? 'C' : 'F'}`;
      document.getElementById(descId).textContent = isMetric ? info[1] : info[2];
    } catch(e) {
      document.getElementById(iconId).textContent = '🌡️';
      document.getElementById(descId).textContent = isMetric ? '无法加载' : 'Unavailable';
    }
  }

  const MSGS = [
    '思念化作倒计时的秒针 ✨',
    '距离拥抱越来越近了 🤍',
    '每一秒都在缩短你我的距离',
    '快了，快了 ~',
    '爱你哦 ❤️',
  ];

  function updateClocks() {
    const now = new Date();

    document.getElementById('time-nj').textContent =
      now.toLocaleTimeString('zh-CN', { timeZone:'Asia/Shanghai', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    document.getElementById('date-nj').textContent =
      now.toLocaleDateString('zh-CN', { timeZone:'Asia/Shanghai', weekday:'long', month:'long', day:'numeric' });

    document.getElementById('time-cp').textContent =
      now.toLocaleTimeString('en-US', { timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    document.getElementById('date-cp').textContent =
      now.toLocaleDateString('en-US', { timeZone:'America/New_York', weekday:'short', month:'long', day:'numeric' });

    const diff = TARGET - now;

    if (diff <= 0) {
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id =>
        document.getElementById(id).textContent = '00');
      document.getElementById('status-msg').textContent = '❤️ 见面的日子到了！';
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-pct').textContent = '100% 已过去';
      return;
    }

    const s = Math.floor(diff / 1000);
    document.getElementById('cd-days').textContent  = pad(Math.floor(s / 86400));
    document.getElementById('cd-hours').textContent = pad(Math.floor((s % 86400) / 3600));
    document.getElementById('cd-mins').textContent  = pad(Math.floor((s % 3600) / 60));
    document.getElementById('cd-secs').textContent  = pad(s % 60);

    const pct = Math.min(100, Math.max(0,
      Math.round(((now - START) / (TARGET - START)) * 100)));
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent  = pct + '% 已过去';

    const idx = Math.floor(now.getSeconds() / 12) % MSGS.length;
    document.getElementById('status-msg').textContent = MSGS[idx];
  }

  // Fetch weather on load
  fetchWeather('Nanjing', true,  'icon-nj', 'temp-nj', 'desc-nj');
  fetchWeather('College+Park,Maryland', false, 'icon-cp', 'temp-cp', 'desc-cp');

  updateClocks();
  setInterval(updateClocks, 1000);
</script>
</body>
</html>
