<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的倒计时 ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --border-strong: rgba(0,0,0,0.14);
      --text-primary: #1a1917;
      --text-secondary: #6b6760;
      --text-tertiary: #a8a49e;
      --rose: #c87070;
      --rose-light: #f5e8e8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141312;
        --surface: #1e1d1b;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.13);
        --text-primary: #f0ede8;
        --text-secondary: #9a9590;
        --text-tertiary: #6a6560;
        --rose: #d48a8a;
        --rose-light: #2e1e1e;
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Crimson Pro', 'Noto Serif SC', Georgia, serif;
      color: var(--text-primary);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: 4px;
      margin-bottom: 6px;
    }

    .header-sub {
      font-size: 14px;
      color: var(--text-tertiary);
      font-style: italic;
      letter-spacing: 1px;
    }

    /* Cities row */
    .cities-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin-bottom: 1.2rem;
    }

    .city-card {
      flex: 1;
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      padding: 1.4rem 1.5rem;
      min-width: 0;
    }

    .city-card:first-child {
      border-radius: 14px 0 0 14px;
      border-right: none;
    }

    .city-card:last-child {
      border-radius: 0 14px 14px 0;
      border-left: 0.5px solid var(--border-strong);
    }

    .city-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .city-time {
      font-size: clamp(28px, 6vw, 36px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 3px;
      font-variant-numeric: tabular-nums;
    }

    .city-date {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 14px;
    }

    .weather-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .weather-icon { font-size: 26px; line-height: 1; }

    .weather-temp {
      font-size: 22px;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1;
    }

    .weather-desc {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: 'Noto Serif SC', serif;
      margin-top: 2px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      flex-shrink: 0;
      flex-direction: column;
      gap: 6px;
    }

    .divider-line {
      width: 1px;
      flex: 1;
      background: var(--border-strong);
    }

    .divider-heart {
      font-size: 18px;
      color: var(--rose);
    }

    .divider-km {
      font-size: 9px;
      color: var(--text-tertiary);
      writing-mode: vertical-lr;
      letter-spacing: 1px;
    }

    /* Countdown */
    .countdown-card {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: 14px;
      padding: 2rem 1.5rem;
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .countdown-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
    }

    .countdown-grid {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 1.4rem;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 60px;
    }

    .cd-num {
      font-size: clamp(38px, 9vw, 52px);
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .cd-lbl {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 1px;
      font-family: 'Noto Serif SC', serif;
    }

    .cd-sep {
      font-size: 40px;
      font-weight: 200;
      color: var(--text-tertiary);
      margin-top: 2px;
      line-height: 1;
      padding-top: 5px;
    }

    .progress-wrap {
      margin: 0 auto 0.6rem;
      max-width: 360px;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--border-strong);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--rose);
      border-radius: 2px;
      transition: width 1s linear;
    }

    .progress-label {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: right;
    }

    .meet-date-line {
      margin-top: 1.2rem;
      font-size: 15px;
      color: var(--text-secondary);
      font-style: italic;
    }

    .status-msg {
      font-size: 13px;
      color: var(--text-tertiary);
      font-style: italic;
      margin-top: 8px;
      min-height: 20px;
      transition: opacity 0.4s;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 1px;
    }

    /* Arrived state */
    .arrived {
      color: var(--rose) !important;
      font-size: 16px !important;
      font-family: 'Noto Serif SC', serif;
    }

    @media (max-width: 480px) {
      .cd-unit { min-width: 46px; }
      .cd-sep { font-size: 28px; }
      .city-card { padding: 1rem 1rem; }
      .countdown-card { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-title">我们的倒计时</div>
      <div class="header-sub">距离下次相聚</div>
    </div>

    <div class="cities-row">
      <div class="city-card">
        <div class="city-name">南京</div>
        <div class="city-time" id="time-nj">--:--:--</div>
        <div class="city-date" id="date-nj">---</div>
        <div class="weather-row">
          <div class="weather-icon" id="icon-nj">⏳</div>
          <div>
            <div class="weather-temp" id="temp-nj">--°C</div>
            <div class="weather-desc" id="desc-nj">加载中…</div>
          </div>
        </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-heart">♥</div>
        <div class="divider-km">10867 km</div>
        <div class="divider-line"></div>
      </div>

      <div class="city-card">
        <div class="city-name">大学公园市</div>
        <div class="city-time" id="time-cp">--:--:--</div>
        <div class="city-date" id="date-cp">---</div>
        <div class="weather-row">
          <div class="weather-icon" id="icon-cp">⏳</div>
          <div>
            <div class="weather-temp" id="temp-cp">--°F</div>
            <div class="weather-desc" id="desc-cp">Loading…</div>
          </div>
        </div>
      </div>
    </div>

    <div class="countdown-card">
      <div class="countdown-label">距 · 相 · 见</div>
      <div class="countdown-grid">
        <div class="cd-unit">
          <div class="cd-num" id="cd-days">--</div>
          <div class="cd-lbl">天</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num" id="cd-hours">--</div>
          <div class="cd-lbl">小时</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num" id="cd-mins">--</div>
          <div class="cd-lbl">分钟</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num" id="cd-secs">--</div>
          <div class="cd-lbl">秒</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progress-label">--% 已过去</div>
      </div>
      <div class="meet-date-line">5月30日 · College Park, MD 🌸</div>
      <div class="status-msg" id="status-msg"></div>
    </div>

    <div class="footer">天气数据来自 Open-Meteo · 每次访问自动更新</div>

  </div>

  <script>
    const TARGET = new Date('2026-05-30T12:00:00');
    const START_REF = new Date('2026-05-07T00:00:00');

    function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

    const ICONS = {
      0:'☀️',1:'☀️',2:'⛅',3:'☁️',
      45:'🌫️',48:'🌫️',
      51:'🌦️',53:'🌦️',55:'🌧️',
      61:'🌧️',63:'🌧️',65:'🌧️',
      71:'❄️',73:'❄️',75:'❄️',
      80:'🌦️',81:'🌦️',82:'🌧️',
      95:'⛈️',96:'⛈️',99:'⛈️'
    };
    const DESC_ZH = {
      0:'晴天',1:'晴天',2:'多云',3:'阴天',
      45:'有雾',48:'有雾',
      51:'小毛毛雨',53:'毛毛雨',55:'大毛毛雨',
      61:'小雨',63:'中雨',65:'大雨',
      71:'小雪',73:'中雪',75:'大雪',
      80:'小阵雨',81:'阵雨',82:'强阵雨',
      95:'雷阵雨',96:'雷阵雨',99:'强雷阵雨'
    };
    const DESC_EN = {
      0:'Clear',1:'Sunny',2:'Partly cloudy',3:'Overcast',
      45:'Foggy',48:'Foggy',
      51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
      61:'Light rain',63:'Rain',65:'Heavy rain',
      71:'Light snow',73:'Snow',75:'Heavy snow',
      80:'Light showers',81:'Showers',82:'Heavy showers',
      95:'Thunderstorm',96:'Thunderstorm',99:'Heavy thunderstorm'
    };

    async function fetchWeather(lat, lon, isMetric, iconId, tempId, descId, descMap) {
      try {
        const unit = isMetric ? 'celsius' : 'fahrenheit';
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=${unit}&timezone=auto`
        );
        const d = await res.json();
        const code = d.current.weather_code;
        const temp = Math.round(d.current.temperature_2m);
        document.getElementById(iconId).textContent = ICONS[code] || '🌡️';
        document.getElementById(tempId).textContent = `${temp}°${isMetric ? 'C' : 'F'}`;
        document.getElementById(descId).textContent = descMap[code] || (isMetric ? '未知' : 'Unknown');
      } catch(e) {
        document.getElementById(iconId).textContent = '🌡️';
        document.getElementById(descId).textContent = isMetric ? '无法加载' : 'Unavailable';
      }
    }

    const MSGS = [
      '思念化作倒计时的秒针 ✨',
      '距离拥抱越来越近了 🤍',
      '每一秒都在缩短你我的距离',
      '快了，快了 ~',
      '爱你哦 ❤️'
    ];

    function updateClocks() {
      const now = new Date();

      document.getElementById('time-nj').textContent =
        now.toLocaleTimeString('zh-CN', { timeZone:'Asia/Shanghai', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
      document.getElementById('date-nj').textContent =
        now.toLocaleDateString('zh-CN', { timeZone:'Asia/Shanghai', weekday:'long', month:'long', day:'numeric' });

      document.getElementById('time-cp').textContent =
        now.toLocaleTimeString('en-US', { timeZone:'America/New_York', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
      document.getElementById('date-cp').textContent =
        now.toLocaleDateString('en-US', { timeZone:'America/New_York', weekday:'short', month:'long', day:'numeric' });

      const diff = TARGET - now;
      if (diff <= 0) {
        ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00');
        document.getElementById('status-msg').textContent = '❤️ 见面的日子到了！';
        document.getElementById('status-msg').classList.add('arrived');
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('progress-label').textContent = '100% 已过去';
        return;
      }

      const totalSecs = Math.floor(diff / 1000);
      document.getElementById('cd-days').textContent = pad(Math.floor(totalSecs / 86400));
      document.getElementById('cd-hours').textContent = pad(Math.floor((totalSecs % 86400) / 3600));
      document.getElementById('cd-mins').textContent = pad(Math.floor((totalSecs % 3600) / 60));
      document.getElementById('cd-secs').textContent = pad(totalSecs % 60);

      const pct = Math.min(100, Math.max(0, Math.round(((now - START_REF) / (TARGET - START_REF)) * 100)));
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = pct + '% 已过去';

      const idx = Math.floor(now.getSeconds() / 12) % MSGS.length;
      document.getElementById('status-msg').textContent = MSGS[idx];
    }

    fetchWeather(32.06, 118.78, true, 'icon-nj', 'temp-nj', 'desc-nj', DESC_ZH);
    fetchWeather(38.99, -76.94, false, 'icon-cp', 'temp-cp', 'desc-cp', DESC_EN);

    updateClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
